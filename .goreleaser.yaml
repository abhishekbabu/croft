version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: croft
    main: ./cmd/croft
    binary: croft
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: croft
    formats:
      - tar.gz
    name_template: "croft_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: abhishekbabu
    name: croft
  draft: false
  prerelease: auto
