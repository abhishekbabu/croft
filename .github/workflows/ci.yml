name: CI

on:
  push:
    branches: [main]
  pull_request:

# Third-party actions are SHA-pinned (with the version in a comment) so a
# moving tag can't silently change what runs. Bump the SHA + comment together.
jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: build
        run: go build ./...
      - name: test
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: coverage
        run: |
          go install github.com/vladopajic/go-test-coverage/v2@v2.18.8
          go-test-coverage --config=.testcoverage.yml
      - name: vet
        run: go vet ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          # Pinned, like the action SHAs above: a floating "latest" lets new
          # lint rules break CI without a deliberate bump.
          version: v2.12.2

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  pin-check:
    name: action SHA pins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      # ratchet lint fails if any action in these workflows is referenced by a
      # moving tag instead of a SHA — enforcing the pinning policy in CI.
      - name: ratchet lint
        run: |
          go install github.com/sethvargo/ratchet@v0.11.4
          ratchet lint .github/workflows/ci.yml .github/workflows/release.yml
